
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Winnin Academy — Level 00 Assessment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f1eb;color:#1a1a1a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.wrap{width:100%;max-width:640px}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.sub{font-size:14px;color:#888;margin-bottom:2rem}
.card{background:#fff;border:1px solid #e0dbd0;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
.metric{background:#f9f7f2;border-radius:8px;padding:12px;text-align:center}
.metric-label{font-size:12px;color:#888;margin-bottom:3px}
.metric-val{font-size:20px;font-weight:500}
.hint{font-size:13px;color:#888;line-height:1.6}
label{display:block;font-size:13px;color:#666;margin-bottom:6px}
input[type=text]{width:100%;padding:10px 14px;font-size:15px;border:1px solid #ccc9be;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
input[type=text]:focus{border-color:#7c3d2e}
.btn{display:inline-block;padding:10px 20px;font-size:14px;border-radius:8px;border:1px solid #d0ccc0;background:#fff;color:#1a1a1a;cursor:pointer;transition:all 0.12s}
.btn:hover{background:#f4f1eb}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:#7c3d2e;color:#fff;border-color:#7c3d2e}
.btn-primary:hover{background:#6a3326}
.btn-full{width:100%;padding:12px}
.progress-bar{height:4px;background:#e0dbd0;border-radius:2px;overflow:hidden;margin-bottom:1.5rem}
.progress-fill{height:100%;background:#7c3d2e;border-radius:2px;transition:width 0.3s}
.section-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:0.75rem}
.s1{background:#fdeee9;color:#7c3d2e}
.s2{background:#fef3c7;color:#7c5e1a}
.s3{background:#e8f0e4;color:#2d5a1b}
.q-text{font-size:15px;font-weight:500;line-height:1.5;margin-bottom:1.25rem}
.opt{display:block;width:100%;text-align:left;padding:12px 16px;margin:6px 0;background:#fff;border:1px solid #e0dbd0;border-radius:8px;cursor:pointer;font-size:14px;color:#1a1a1a;transition:all 0.12s;line-height:1.4}
.opt:hover{border-color:#c4a07a;background:#fdf9f5}
.opt.selected{border-color:#7c3d2e;background:#fdeee9;color:#7c3d2e}
.opt.correct{border-color:#2d6a1f;background:#e8f4e4;color:#1e5214}
.opt.wrong{border-color:#c0392b;background:#fde8e8;color:#922b21}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem}
.score-big{font-size:38px;font-weight:500;text-align:center;margin:0.5rem 0}
.score-sub{font-size:14px;color:#888;text-align:center;margin-bottom:1.5rem}
.pass-pill{display:inline-block;padding:4px 16px;border-radius:20px;font-size:14px;font-weight:500}
.pass{background:#e8f4e4;color:#1e5214}
.fail{background:#fde8e8;color:#922b21}
.breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
.log-status{font-size:12px;margin-top:8px;text-align:center}
.log-ok{color:#2d6a1f}.log-err{color:#c0392b}.log-pending{color:#888}
.retake-hint{font-size:13px;color:#888;text-align:center;margin-top:0.75rem;line-height:1.6}
.save-notice{background:#fdf6e8;border:1px solid #e8c97a;border-radius:8px;padding:12px 16px;font-size:13px;color:#7c5e1a;line-height:1.5;margin-top:1rem;text-align:center}

/* ── CERTIFICATE ─────────────────────────────── */
.cert-wrap{margin-top:1.25rem;padding:4px;background:linear-gradient(135deg,#c4a35a,#8b3a2f,#2d4a22,#c4a35a);border-radius:14px}
.cert{background:#fdf8f0;border-radius:11px;padding:2.5rem 2rem;text-align:center;position:relative;overflow:hidden}
.cert::before{content:'';position:absolute;inset:12px;border:1px solid #d4b896;border-radius:6px;pointer-events:none}
.cert-corner{position:absolute;width:48px;height:48px;opacity:0.18}
.cert-corner svg{width:48px;height:48px}
.cert-tl{top:8px;left:8px}
.cert-tr{top:8px;right:8px;transform:scaleX(-1)}
.cert-bl{bottom:8px;left:8px;transform:scaleY(-1)}
.cert-br{bottom:8px;right:8px;transform:scale(-1)}
.cert-crown{font-size:32px;margin-bottom:8px;display:block}
.cert-academy{font-size:10px;letter-spacing:3px;color:#8b3a2f;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.cert-divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,#c4a35a,transparent);margin:10px auto}
.cert-pre{font-size:12px;color:#888;margin-bottom:6px;letter-spacing:0.5px}
.cert-name{font-size:26px;font-weight:600;color:#1a1a1a;margin:6px 0;font-style:italic}
.cert-completed{font-size:12px;color:#888;margin-bottom:4px}
.cert-course{font-size:15px;font-weight:600;color:#1a1a1a;margin:4px 0}
.cert-score{font-size:13px;color:#7c5e1a;margin-bottom:1.5rem;font-weight:500}
.cert-seal{display:inline-block;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle,#c4a35a,#8b6914);color:#fff;font-size:22px;line-height:52px;margin-bottom:1rem;box-shadow:0 2px 8px rgba(140,90,20,0.35)}
.cert-footer{border-top:1px solid #e8dcc8;padding-top:1.25rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem}
.cert-sig{text-align:center}
.cert-sig-name{font-size:14px;font-weight:600;color:#1a1a1a;font-style:italic}
.cert-sig-title{font-size:11px;color:#888;margin-top:2px}
.cert-date{text-align:left;font-size:11px;color:#aaa}
.cert-id{text-align:right;font-size:11px;color:#aaa}
</style>
</head>
<body>
<div class="wrap"><div id="app"></div></div>
<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const NOTION_TOKEN = "PASTE_YOUR_NOTION_INTEGRATION_TOKEN_HERE";
const NOTION_DB_ID = "73e550e5c63c46c2940a88f43d605327";
const PASS = 16; // 80% of 20
// ─────────────────────────────────────────────────────────────────────────────

const Qs = [
  // ── SECTION 1: WHY WINNIN EXISTS (5 questions) ──
  {
    s:"Why Winnin Exists", sn:1,
    q:"According to Michael Goldhaber's theory of the Attention Economy, what is the truly scarce resource in the digital age?",
    opts:[
      "Information — abundant on the web and growing faster than anyone can consume it",
      "Attention — which can only be earned through relevance, never simply purchased",
      "Money — since the cost of digital advertising keeps rising across all platforms",
      "Data — which most brands collect at scale but rarely know how to interpret"
    ], c:1
  },
  {
    s:"Why Winnin Exists", sn:1,
    q:"What percentage of total brand-related engagement on social platforms comes from organic, user-generated content?",
    opts:[
      "Less than 30% of total brand-related engagement",
      "Approximately 50% of total brand-related engagement",
      "More than 70% of total brand-related engagement",
      "More than 90% of total brand-related engagement"
    ], c:2
  },
  {
    s:"Why Winnin Exists", sn:1,
    q:"What is the Outside-In mindset?",
    opts:[
      "Starting with external data sources instead of relying on the brand's own internal research",
      "Starting from what audiences care about in culture, then finding where the brand fits",
      "Focusing exclusively on earned media channels at the expense of owned and paid content",
      "Briefing creative teams using outputs exported directly from social listening platforms"
    ], c:1
  },
  {
    s:"Why Winnin Exists", sn:1,
    q:"What makes Winnin fundamentally different from social listening tools?",
    opts:[
      "Winnin monitors a broader set of platforms than any social listening tool on the market",
      "Winnin is behavioral — it measures what people actually do, not what they say",
      "Winnin applies proprietary sentiment analysis that no competing tool can replicate",
      "Winnin focuses exclusively on video content created by paid brand influencers"
    ], c:1
  },
  {
    s:"Why Winnin Exists", sn:1,
    q:"What is Herbert Simon's contribution to the foundational theory behind the Attention Economy?",
    opts:[
      "He proved that earned media generates three times more trust than paid advertising content",
      "He identified that a wealth of information creates a poverty of attention in the receiver",
      "He developed the first quantitative framework for measuring cultural relevance in marketing",
      "He coined the term 'attention economy' after conducting research at Stanford in the 1990s"
    ], c:1
  },

  // ── SECTION 2: HOW WE WORK (5 questions) ──
  {
    s:"How We Work", sn:2,
    q:"What is the primary reason Winnin is a platform business rather than a service business?",
    opts:[
      "Winnin sells only annual software licenses and does not offer any project-based pricing",
      "Revenue and headcount decouple — one system can serve more clients without proportional added cost",
      "The team never participates directly in client calls or in any strategic presentations",
      "The platform is built to fully replace the need for human strategic analysis over time"
    ], c:1
  },
  {
    s:"How We Work", sn:2,
    q:"The Winnin Methodology always follows which core analytical principle?",
    opts:[
      "Micro to macro — begin with the specific question and gradually zoom out to the category",
      "Brand-first — always start by deeply understanding the client's own brand performance data",
      "Macro to micro — always start broad and funnel progressively down to the specific insight",
      "Category-first — always begin with category-level data before examining any individual brand"
    ], c:2
  },
  {
    s:"How We Work", sn:2,
    q:"A client brief says: 'We want to target Gen Z on TikTok with our new skincare line.' What is the correct first step?",
    opts:[
      "Build a TikTok dashboard immediately and run a full creator analysis for this category",
      "Strip the executional layer and ask: what does this specific audience genuinely care about?",
      "Check the client's current Share of Attention on TikTok before taking any other action",
      "Accept the brief as written and immediately begin a detailed TikTok performance analysis"
    ], c:1
  },
  {
    s:"How We Work", sn:2,
    q:"When should the default be to build a Dashboard rather than a Deck?",
    opts:[
      "Only when the client explicitly requests a dashboard instead of a standard presentation format",
      "Always — a deck is never the right output in a platform business under any circumstances",
      "When the data needs to stay current, be explored by the client, or be consulted repeatedly",
      "Only for complex strategic analyses that require deep filtering and cross-platform data work"
    ], c:2
  },
  {
    s:"How We Work", sn:2,
    q:"What are the three pillars of the Winnin Health Score and their respective weights?",
    opts:[
      "NPS Score (40%), Churn Risk Assessment (30%), and Expansion Revenue Generated (30%)",
      "Product Adoption (30%), Journey Progress (40%), and Client Experience / Satisfaction (30%)",
      "Platform Usage Frequency (50%), Relationship Recurrence (30%), and Client Advocacy (20%)",
      "Engagement Rate (33%), Revenue Growth (33%), and Client Satisfaction Survey Score (34%)"
    ], c:1
  },

  // ── SECTION 3: MEET WINNIN INTELLIGENCE (10 questions) ──
  {
    s:"Meet Winnin Intelligence", sn:3,
    q:"Where do you find the Category page in Winnin Intelligence?",
    opts:[
      "In a dedicated Category tab accessible from the top-level navigation sidebar",
      "Under the Brand tab, nested within the Overview sub-section of the platform",
      "Inside the Culture tab, as one of its four main navigable sub-sections",
      "In the Insights tab, under Dashboards, in a dedicated Category analysis view"
    ], c:2
  },
  {
    s:"Meet Winnin Intelligence", sn:3,
    q:"To create a Custom Topic (Owned Topic), you must navigate to:",
    opts:[
      "Insights tab → Dashboards section → use the Create New Topic option in the menu",
      "Culture tab → Videos section → build a boolean query → click Create Topic",
      "Culture tab → Topics section → My Topics sub-tab → use the Create Custom button",
      "Home tab → ZAI interface → type a prompt to generate a Custom Topic automatically"
    ], c:1
  },
  {
    s:"Meet Winnin Intelligence", sn:3,
    q:"What is E7 and why is it used to calculate the Relevance Index?",
    opts:[
      "The top 7 most engaged videos, used to estimate the overall size of a cultural territory",
      "A rolling 7-day average of views, used to smooth out daily fluctuations in performance",
      "Engagement measured on the 7th day after publishing, used for fair cross-time comparison",
      "Engagement from the 7 most active creators in a territory, used as a cultural relevance proxy"
    ], c:2
  },
  {
    s:"Meet Winnin Intelligence", sn:3,
    q:"What is the key difference between how the Brand tab and Share of Attention handle historical content?",
    opts:[
      "The Brand tab covers a broader set of social platforms than Share of Attention does",
      "SoA counts all videos ever posted; the Brand tab only counts videos from the selected period",
      "The Brand tab applies sentiment filtering to all data, while SoA includes all sentiment equally",
      "There is no meaningful difference — both draw from the exact same underlying dataset"
    ], c:1
  },
  {
    s:"Meet Winnin Intelligence", sn:3,
    q:"The Relationship metric in Winnin's Affinity section is best described as:",
    opts:[
      "The percentage of audience overlap between two topics, expressed as a universal figure",
      "A relative score of audience connection — only meaningful when compared within the same analysis",
      "The total number of creators who actively produce content on both topics simultaneously",
      "The commercial correlation between two brand territories competing within the same category"
    ], c:1
  },
  {
    s:"Meet Winnin Intelligence", sn:3,
    q:"Which platform is NOT included in Winnin's engagement calculation, and why?",
    opts:[
      "YouTube — which provides like and comment engagement data through its official API",
      "Instagram — available through Meta's API when a Facebook account is connected to the platform",
      "Twitch — whose API collects view data but does not provide publicly accessible engagement metrics",
      "TikTok — which provides likes, comments, and shares through its data access arrangements"
    ], c:2
  },
  {
    s:"Meet Winnin Intelligence", sn:3,
    q:"Share of Attention filters for what type of content when calculating brand relevance?",
    opts:[
      "Only organic UGC content — all owned and paid channel content is excluded from the calculation",
      "Positive and neutral sentiment content only — negative content is excluded from the calculation",
      "Only content posted within the last 12 months, to ensure the data reflects current relevance",
      "All content regardless of sentiment, but weighted differently according to the engagement type"
    ], c:1
  },
  {
    s:"Meet Winnin Intelligence", sn:3,
    q:"ZAI operates in two main analytical contexts. What are they?",
    opts:[
      "Paid content analysis and organic content analysis, covering all five data source platforms",
      "Brand context for competitive and performance analysis, and Territory context for cultural insights",
      "Historical trend analysis for long-term strategy, and real-time monitoring for live cultural moments",
      "Strategic planning analysis for annual reviews, and campaign activation analysis for live events"
    ], c:1
  },
  {
    s:"Meet Winnin Intelligence", sn:3,
    q:"The Tag Monitoring feature reduces standard data ingestion from 24–48 hours to approximately:",
    opts:[
      "Around 1 hour, making it near real-time and suitable for the fastest-moving cultural moments",
      "Around 4 hours, enabling near real-time tracking of live campaigns and cultural activations",
      "Around 8 hours, covering approximately one full business day of standard data processing",
      "Around 12 hours, providing same-day data delivery for most brand activation requirements"
    ], c:1
  },
  {
    s:"Meet Winnin Intelligence", sn:3,
    q:"Why does Winnin keep Music Topics in separate tabs within the Culture section?",
    opts:[
      "Music content is licensed differently and requires special platform permissions to access it",
      "Music analysis is gated behind a separate subscription tier that must be unlocked first",
      "Music generates views far larger than other content types, which distorts category comparisons",
      "Music topics require an entirely separate machine learning model to classify and analyze correctly"
    ], c:2
  }
];

const sc = {1:"s1", 2:"s2", 3:"s3"};
let st = {screen:"welcome", name:"", qi:0, ans:{}, sel:null, res:null, reviewed:false, logging:false, logErr:null, logOk:false};

async function logResult(r) {
  st.logging = true; st.logErr = null; st.logOk = false; render();
  const today = new Date().toISOString().split("T")[0];
  try {
    const resp = await fetch("https://api.notion.com/v1/pages", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + NOTION_TOKEN,
        "Notion-Version": "2022-06-28",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        parent: { database_id: NOTION_DB_ID },
        properties: {
          "Full Name": { title: [{ text: { content: st.name.trim() } }] },
          "Date": { date: { start: today } },
          "Score": { number: r.total },
          "Percentage": { number: r.pct },
          "Result": { select: { name: r.total >= PASS ? "✅ Pass" : "❌ Fail" } },
          "Why Winnin Exists": { number: r.s1 },
          "How We Work": { number: r.s2 },
          "Meet Winnin Intelligence": { number: r.s3 }
        }
      })
    });
    if (resp.ok) { st.logOk = true; }
    else { const b = await resp.json().catch(() => ({})); console.error("Notion:", b); st.logErr = "Logging failed — please screenshot your certificate and notify your manager."; }
  } catch(e) { console.error(e); st.logErr = "Logging failed — please screenshot your certificate and notify your manager."; }
  st.logging = false; render();
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function cornerSVG() {
  return `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 4 L4 20 M4 4 L20 4" stroke="#8b3a2f" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M4 8 L8 4" stroke="#c4a35a" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="6" cy="6" r="2" fill="#8b3a2f"/>
  </svg>`;
}

function render() {
  const app = document.getElementById("app");
  if (st.screen === "welcome") app.innerHTML = welcome();
  else if (st.screen === "quiz") app.innerHTML = quiz();
  else app.innerHTML = results();
  bind();
}

function welcome() {
  const ok = st.name.trim().length >= 2;
  return `<h1>Winnin Academy</h1>
<p class="sub">Level 00: Foundations — Assessment</p>
<div class="card">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Questions</div><div class="metric-val">20</div></div>
    <div class="metric"><div class="metric-label">Pass score</div><div class="metric-val">80%</div></div>
    <div class="metric"><div class="metric-label">Sections</div><div class="metric-val">3</div></div>
  </div>
  <p class="hint">Covers <strong>Why Winnin Exists</strong> (5 questions), <strong>How We Work</strong> (5 questions), and <strong>Meet Winnin Intelligence</strong> (10 questions).<br>You need <strong>16 out of 20</strong> to pass. Results are logged automatically to the team database.</p>
</div>
<div class="card">
  <label>Your full name</label>
  <input type="text" id="nameInput" value="${esc(st.name)}" placeholder="e.g. Maria Santos" maxlength="80" />
</div>
<button class="btn btn-primary btn-full" id="startBtn" ${ok ? "" : "disabled"}>Start assessment →</button>`;
}

function quiz() {
  const q = Qs[st.qi];
  const pct = Math.round((st.qi / Qs.length) * 100);
  let opts = "";
  q.opts.forEach((o, i) => {
    let cls = "opt";
    if (st.reviewed) {
      if (i === q.c) cls += " correct";
      else if (i === st.sel && i !== q.c) cls += " wrong";
    } else {
      if (i === st.sel) cls += " selected";
    }
    opts += `<button class="${cls}" data-i="${i}">${String.fromCharCode(65+i)}. ${esc(o)}</button>`;
  });
  const showCheck = st.sel !== null && !st.reviewed;
  const isLast = st.qi === Qs.length - 1;
  return `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
  <span class="section-pill ${sc[q.sn]}">${esc(q.s)}</span>
  <span style="font-size:13px;color:#888">${st.qi+1} / ${Qs.length}</span>
</div>
<p class="q-text">${esc(q.q)}</p>
<div id="opts">${opts}</div>
<div class="nav">
  <button class="btn" id="backBtn" ${st.qi === 0 ? "disabled" : ""}>← Back</button>
  <div style="display:flex;gap:8px">
    ${showCheck ? `<button class="btn" id="checkBtn">Check answer</button>` : ""}
    <button class="btn btn-primary" id="nextBtn" ${st.sel === null ? "disabled" : ""}>${isLast ? "Submit →" : "Next →"}</button>
  </div>
</div>`;
}

function results() {
  const r = st.res;
  const passed = r.total >= PASS;
  const date = new Date().toLocaleDateString("en-US", {year:"numeric", month:"long", day:"numeric"});
  const certId = "WA-L00-" + new Date().getFullYear() + "-" + Math.random().toString(36).substr(2,6).toUpperCase();

  const logHtml = st.logging
    ? `<p class="log-status log-pending">Logging result to team database...</p>`
    : st.logErr
    ? `<p class="log-status log-err">${esc(st.logErr)}</p>`
    : st.logOk
    ? `<p class="log-status log-ok">✓ Result logged to team database.</p>`
    : "";

  const cert = passed ? `
  <div class="cert-wrap">
    <div class="cert">
      <div class="cert-corner cert-tl">${cornerSVG()}</div>
      <div class="cert-corner cert-tr">${cornerSVG()}</div>
      <div class="cert-corner cert-bl">${cornerSVG()}</div>
      <div class="cert-corner cert-br">${cornerSVG()}</div>
      <span class="cert-crown">♛</span>
      <div class="cert-academy">Winnin Academy</div>
      <div class="cert-divider"></div>
      <p class="cert-pre">This is to certify that</p>
      <div class="cert-name">${esc(st.name)}</div>
      <p class="cert-completed">has successfully completed</p>
      <div class="cert-course">Level 00: Foundations</div>
      <div class="cert-score">Score: ${r.total}/20 &nbsp;·&nbsp; ${r.pct}% &nbsp;·&nbsp; Pass</div>
      <div class="cert-divider"></div>
      <div class="cert-seal">♛</div>
      <div class="cert-footer">
        <div class="cert-date">${esc(date)}</div>
        <div class="cert-sig">
          <div class="cert-sig-name">Gian Martinez</div>
          <div class="cert-sig-title">Founder &amp; CEO, Winnin</div>
        </div>
        <div class="cert-id">${certId}</div>
      </div>
    </div>
  </div>
  <div class="save-notice">
    📸 <strong>Save your certificate.</strong> Take a screenshot or use your browser's Print function (Ctrl/Cmd + P → Save as PDF) to keep a copy — in case the automatic log didn't go through.
  </div>` : "";

  const hint = !passed
    ? `<p class="retake-hint">You need ${PASS - r.total} more correct answer${PASS - r.total === 1 ? "" : "s"} to pass (16/20 required). Review the summary pages at the end of each section and retake when you're ready.</p>`
    : "";

  return `<div style="text-align:center;margin-bottom:1.5rem">
  <span class="pass-pill ${passed ? "pass" : "fail"}">${passed ? "Assessment passed ✓" : "Assessment not passed"}</span>
  <div class="score-big">${r.total}/20</div>
  <div class="score-sub">${r.pct}% · ${passed ? "Pass" : "Fail"} · 80% required</div>
</div>
<div class="breakdown">
  <div class="metric"><div class="metric-label">Why Winnin Exists</div><div class="metric-val">${r.s1}/5</div></div>
  <div class="metric"><div class="metric-label">How We Work</div><div class="metric-val">${r.s2}/5</div></div>
  <div class="metric"><div class="metric-label">Meet Winnin Intel.</div><div class="metric-val">${r.s3}/10</div></div>
</div>
${logHtml}
${cert}
${hint}
<div style="display:flex;gap:8px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap">
  <button class="btn" id="retakeBtn">Retake assessment</button>
  ${passed ? `<button class="btn btn-primary" onclick="window.print()">Print / Save as PDF</button>` : ""}
</div>`;
}

function bind() {
  const ni = document.getElementById("nameInput");
  if (ni) {
    ni.addEventListener("input", e => {
      st.name = e.target.value;
      document.getElementById("startBtn").disabled = st.name.trim().length < 2;
    });
    ni.addEventListener("keydown", e => {
      if (e.key === "Enter" && st.name.trim().length >= 2) document.getElementById("startBtn").click();
    });
  }
  const sb = document.getElementById("startBtn");
  if (sb) sb.addEventListener("click", () => {
    if (st.name.trim().length >= 2) {
      st.screen = "quiz"; st.qi = 0; st.ans = {}; st.sel = null; st.reviewed = false; render();
    }
  });
  document.querySelectorAll(".opt").forEach(b => {
    b.addEventListener("click", () => { if (st.reviewed) return; st.sel = parseInt(b.dataset.i); render(); });
  });
  const cb = document.getElementById("checkBtn");
  if (cb) cb.addEventListener("click", () => { st.reviewed = true; render(); });
  const nb = document.getElementById("nextBtn");
  if (nb) nb.addEventListener("click", () => {
    if (st.sel === null) return;
    st.ans[st.qi] = st.sel; st.reviewed = false;
    if (st.qi === Qs.length - 1) {
      let s1=0, s2=0, s3=0;
      Qs.forEach((q, i) => {
        const ok = st.ans[i] === q.c;
        if (q.sn === 1 && ok) s1++;
        if (q.sn === 2 && ok) s2++;
        if (q.sn === 3 && ok) s3++;
      });
      const total = s1+s2+s3;
      const pct = Math.round((total/20)*100);
      st.res = {s1, s2, s3, total, pct};
      st.screen = "results"; render();
      logResult(st.res);
    } else {
      st.qi++; st.sel = st.ans[st.qi] ?? null; render();
    }
  });
  const bb = document.getElementById("backBtn");
  if (bb) bb.addEventListener("click", () => {
    if (st.qi > 0) { st.qi--; st.sel = st.ans[st.qi] ?? null; st.reviewed = false; render(); }
  });
  const rb = document.getElementById("retakeBtn");
  if (rb) rb.addEventListener("click", () => {
    st.screen = "welcome"; st.qi = 0; st.ans = {}; st.sel = null; st.res = null; st.reviewed = false; render();
  });
}

render();
</script>
</body>
</html>
