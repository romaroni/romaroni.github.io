
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Winnin Academy — Level 01 Assessment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f1eb;color:#1a1a1a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.wrap{width:100%;max-width:640px}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.sub{font-size:14px;color:#888;margin-bottom:2rem}
.card{background:#fff;border:1px solid #e0dbd0;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
.metric{background:#f9f7f2;border-radius:8px;padding:12px;text-align:center}
.metric-label{font-size:12px;color:#888;margin-bottom:3px}
.metric-val{font-size:20px;font-weight:500}
.hint{font-size:13px;color:#888;line-height:1.6}
label{display:block;font-size:13px;color:#666;margin-bottom:6px}
input[type=text]{width:100%;padding:10px 14px;font-size:15px;border:1px solid #ccc9be;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
input[type=text]:focus{border-color:#7c3d2e}
.btn{display:inline-block;padding:10px 20px;font-size:14px;border-radius:8px;border:1px solid #d0ccc0;background:#fff;color:#1a1a1a;cursor:pointer;transition:all 0.12s}
.btn:hover{background:#f4f1eb}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:#7c3d2e;color:#fff;border-color:#7c3d2e}
.btn-primary:hover{background:#6a3326}
.btn-full{width:100%;padding:12px}
.progress-bar{height:4px;background:#e0dbd0;border-radius:2px;overflow:hidden;margin-bottom:1.5rem}
.progress-fill{height:100%;background:#7c3d2e;border-radius:2px;transition:width 0.3s}
.section-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:0.75rem}
.s1{background:#fdeee9;color:#7c3d2e}
.s2{background:#fef3c7;color:#7c5e1a}
.s3{background:#e8f0e4;color:#2d5a1b}
.q-text{font-size:15px;font-weight:500;line-height:1.5;margin-bottom:1.25rem}
.opt{display:block;width:100%;text-align:left;padding:12px 16px;margin:6px 0;background:#fff;border:1px solid #e0dbd0;border-radius:8px;cursor:pointer;font-size:14px;color:#1a1a1a;transition:all 0.12s;line-height:1.4}
.opt:hover{border-color:#c4a07a;background:#fdf9f5}
.opt.selected{border-color:#7c3d2e;background:#fdeee9;color:#7c3d2e}
.opt.correct{border-color:#2d6a1f;background:#e8f4e4;color:#1e5214}
.opt.wrong{border-color:#c0392b;background:#fde8e8;color:#922b21}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem}
.score-big{font-size:38px;font-weight:500;text-align:center;margin:0.5rem 0}
.score-sub{font-size:14px;color:#888;text-align:center;margin-bottom:1.5rem}
.pass-pill{display:inline-block;padding:4px 16px;border-radius:20px;font-size:14px;font-weight:500}
.pass{background:#e8f4e4;color:#1e5214}
.fail{background:#fde8e8;color:#922b21}
.breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
.log-status{font-size:12px;margin-top:8px;text-align:center}
.log-ok{color:#2d6a1f}.log-err{color:#c0392b}.log-pending{color:#888}
.retake-hint{font-size:13px;color:#888;text-align:center;margin-top:0.75rem;line-height:1.6}
.save-notice{background:#fdf6e8;border:1px solid #e8c97a;border-radius:8px;padding:12px 16px;font-size:13px;color:#7c5e1a;line-height:1.5;margin-top:1rem;text-align:center}

/* ── CERTIFICATE ─────────────────────────────── */
.cert-wrap{margin-top:1.25rem;padding:4px;background:linear-gradient(135deg,#c4a35a,#8b3a2f,#2d4a22,#c4a35a);border-radius:14px}
.cert{background:#fdf8f0;border-radius:11px;padding:2.5rem 2rem;text-align:center;position:relative;overflow:hidden}
.cert::before{content:'';position:absolute;inset:12px;border:1px solid #d4b896;border-radius:6px;pointer-events:none}
.cert-corner{position:absolute;width:48px;height:48px;opacity:0.18}
.cert-corner svg{width:48px;height:48px}
.cert-tl{top:8px;left:8px}
.cert-tr{top:8px;right:8px;transform:scaleX(-1)}
.cert-bl{bottom:8px;left:8px;transform:scaleY(-1)}
.cert-br{bottom:8px;right:8px;transform:scale(-1)}
.cert-crown{width:72px;height:72px;display:block;margin:0 auto 8px;object-fit:contain;mix-blend-mode:multiply}
.cert-academy{font-size:10px;letter-spacing:3px;color:#8b3a2f;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.cert-divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,#c4a35a,transparent);margin:10px auto}
.cert-pre{font-size:12px;color:#888;margin-bottom:6px;letter-spacing:0.5px}
.cert-name{font-size:26px;font-weight:600;color:#1a1a1a;margin:6px 0;font-style:italic}
.cert-completed{font-size:12px;color:#888;margin-bottom:4px}
.cert-course{font-size:15px;font-weight:600;color:#1a1a1a;margin:4px 0}
.cert-score{font-size:13px;color:#7c5e1a;margin-bottom:1.5rem;font-weight:500}
.cert-seal{display:inline-block;width:52px;height:52px;border-radius:50%;background:#1a1a1a;padding:6px;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.4)}.cert-seal img{width:100%;height:100%;object-fit:contain}
.cert-footer{border-top:1px solid #e8dcc8;padding-top:1.25rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem}
.cert-sig{text-align:center}
.cert-sig-name{font-size:14px;font-weight:600;color:#1a1a1a;font-style:italic}
.cert-sig-title{font-size:11px;color:#888;margin-top:2px}
.cert-date{text-align:left;font-size:11px;color:#aaa}
.cert-id{text-align:right;font-size:11px;color:#aaa}
</style>
</head>
<body>
<div class="wrap"><div id="app"></div></div>
<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const NOTION_TOKEN = "PASTE_YOUR_NOTION_INTEGRATION_TOKEN_HERE";
const NOTION_DB_ID = "73e550e5c63c46c2940a88f43d605327";
const PASS = 16; // 80% of 20
// ─────────────────────────────────────────────────────────────────────────────

const Qs = [
  // ── SECTION 1: SHARE OF ATTENTION (6 questions) ──
  {
    s:"Share of Attention", sn:1,
    q:"What is Share of Attention (SoA)?",
    opts:[
      "Winnin's proprietary metric estimating the percentage of consumer attention directed to brands within a category, based on real video interactions across platforms",
      "A weekly survey distributed to consumers asking which brands they recall seeing advertised, compiled into a composite index for each product category",
      "A measure of how many social media followers a brand has accumulated relative to competitors within the same market segment",
      "A metric identical to Share of Voice, but applied specifically to video content across YouTube, TikTok, and Instagram"
    ], c:0
  },
  {
    s:"Share of Attention", sn:1,
    q:"Why does SoA exclude negative content from its calculation?",
    opts:[
      "Negative content typically has lower view counts across all platforms, which would artificially skew the composite score downward for most brands",
      "Clients contractually require that unfavorable data about their brands be excluded from all dashboards and reports delivered by Winnin",
      "Current AI classification models cannot reliably distinguish between genuinely negative content and sarcastic or ironic content at scale",
      "SoA measures genuine cultural relevance and mental availability — not controversy or backlash — so sentiment filtering ensures the metric reflects brands people actually want to engage with"
    ], c:3
  },
  {
    s:"Share of Attention", sn:1,
    q:"How does SoA apply platform weighting in its calculation?",
    opts:[
      "YouTube always receives the highest weighting because it has the largest global user base and the longest average watch times across all content categories",
      "All platforms receive equal weight regardless of category or country, ensuring that no single platform disproportionately influences the composite score",
      "Each platform is weighted differently based on its importance within the specific category and country — Facebook may be heavy for haircare in India while YouTube and Twitch are prioritized for gaming in the US",
      "Platform weighting is determined by the client during onboarding based on where they allocate the largest share of their media budget"
    ], c:2
  },
  {
    s:"Share of Attention", sn:1,
    q:"In the SoA timeline view, you see a brand rising steadily for four consecutive months. What does this pattern most likely indicate?",
    opts:[
      "A single viral campaign that generated strong initial buzz and is now producing lingering residual effects across multiple platforms",
      "Structural growth — the brand is building attention consistently through sustained content performance, not just a one-off spike",
      "An increase in paid media investment that will likely stop producing results once the campaign budget runs out at the end of the quarter",
      "A data indexing error caused by retroactive video classification that should be flagged and reported to the Refinement team for investigation"
    ], c:1
  },
  {
    s:"Share of Attention", sn:1,
    q:"Which statement best describes the relationship between SoA and Market Share?",
    opts:[
      "SoA and Market Share always move in exactly the same direction at the same time, making them interchangeable metrics for tracking competitive position",
      "There is no measurable relationship between SoA and Market Share — they track fundamentally different dimensions of brand performance that rarely correlate",
      "SoA is a lagging indicator that confirms market share trends after they have already materialized in quarterly sales and distribution reports",
      "SoA is a leading indicator — brands that consistently grow their SoA tend to see that reflected in market share over time, as demonstrated by the 2026 Winnin-Uncover study"
    ], c:3
  },
  {
    s:"Share of Attention", sn:1,
    q:"A client asks: 'Why is my SoA different from my engagement numbers?' What is the correct explanation?",
    opts:[
      "SoA is based on consumer survey data collected quarterly, which naturally differs from the real-time engagement metrics available through native platform analytics dashboards",
      "SoA only measures YouTube data because it's the platform with the most reliable API access, while engagement numbers typically aggregate data from all social platforms",
      "SoA is only updated on a quarterly basis, so there will always be a significant time lag relative to real-time engagement metrics that update daily",
      "SoA applies platform weighting, category filtering, and sentiment filtering that raw engagement metrics don't have"
    ], c:3
  },

  // ── SECTION 2: CATEGORY INTELLIGENCE (6 questions) ──
  {
    s:"Category Intelligence", sn:2,
    q:"What is the core question that Category Intelligence answers?",
    opts:[
      "Which creators have the highest follower counts within the category and which brands are currently partnering with them across sponsored content deals",
      "How much budget should the brand allocate to each social media platform based on historical campaign performance data and projected audience growth",
      "What is actually happening in this category right now — what people are watching, what's growing, what's declining — and where it's going",
      "How is the brand performing relative to its three closest competitors this quarter based on engagement rates and content volume metrics"
    ], c:2
  },
  {
    s:"Category Intelligence", sn:2,
    q:"Why does the Winnin methodology always begin at the category level, before looking at brand data?",
    opts:[
      "Starting with the category protects the analysis from confirmation bias — the category is the signal, and your brand is what you bring to it after understanding the landscape",
      "Because the category data loads faster in the platform's back-end infrastructure, making it more practical to start there before moving to the heavier brand-level queries",
      "Because category data is always more statistically accurate than brand data due to the significantly larger sample sizes involved in category-level video classification",
      "Because client briefing documents always request category data first, so following their standard format creates alignment between deliverables and expectations"
    ], c:0
  },
  {
    s:"Category Intelligence", sn:2,
    q:"In the Category Intelligence Niches view, the donut chart shows a theme with a small share of Videos but a disproportionately large share of Engagement. What does this imbalance indicate?",
    opts:[
      "The data for that theme is likely unreliable due to a small sample size and should be disregarded until the next indexing cycle produces more consistent numbers",
      "The theme has already peaked and is now in structural decline — creators are abandoning it while residual engagement from older content keeps the numbers artificially high",
      "The theme is oversaturated with branded content that is generating engagement primarily through paid amplification rather than organic audience interest",
      "The theme is underleveraged — high audience demand with low content supply — which represents an opportunity to move first before competitors fill the gap"
    ], c:3
  },
  {
    s:"Category Intelligence", sn:2,
    q:"What is the difference between the 'Relevance' toggle and the 'Views' toggle in the Category Intelligence line chart?",
    opts:[
      "Views shows raw reach over time, while Relevance is a weighted signal that accounts for both volume and engagement momentum — making it especially useful for catching emerging niches early",
      "They display identical underlying data but render it in different visual formats — Views as a line chart and Relevance as a stacked area chart — for presentation flexibility",
      "Relevance exclusively measures TikTok performance because that platform's algorithm most accurately reflects cultural momentum, while Views aggregates data from all platforms",
      "Views is a backward-looking historical metric that shows cumulative totals, while Relevance is a forward-looking predictive metric that only shows real-time streaming data"
    ], c:0
  },
  {
    s:"Category Intelligence", sn:2,
    q:"A strategist reads the Category Intelligence topic data but skips watching the most engaged videos. Which common mistake are they making?",
    opts:[
      "Reading the category once and treating it as a permanent, unchanging landscape that doesn't require regular revisiting as the strategic context evolves",
      "Using only one chart type in the Niches view, which limits their ability to understand both current performance and directional trends simultaneously",
      "Ignoring the video layer — the topics tell you what's winning, but the videos tell you why — and skipping them means missing the qualitative layer that makes the data actionable",
      "Treating cross-platform differences as statistical noise rather than recognizing that each platform hosts a distinct version of the category conversation"
    ], c:2
  },
  {
    s:"Category Intelligence", sn:2,
    q:"Why is it important to filter Category Intelligence by platform?",
    opts:[
      "Platform filtering is a mandatory technical step required by the system architecture before any category-level data will load in the dashboard interface",
      "Categories often behave very differently across platforms — the same food category might be dominated by long-form recipe tutorials on YouTube and 15-second reaction clips on TikTok",
      "YouTube is the only platform with fully reliable and API-validated data, so filtering allows you to isolate the single most trustworthy data source from the rest",
      "Platform filtering automatically adjusts the currency of all engagement metrics to a standardized unit, enabling fair cross-platform comparison"
    ], c:1
  },

  // ── SECTION 3: BRAND INTELLIGENCE (8 questions) ──
  {
    s:"Brand Intelligence", sn:3,
    q:"What is the key difference between Brand Intelligence and a brand's native analytics?",
    opts:[
      "Brand Intelligence is significantly cheaper to access and maintain than enterprise-level native platform analytics suites from YouTube, Meta, and TikTok",
      "Native analytics measure what happens inside your own channels, while Brand Intelligence includes paid, owned, and UGC — showing how the brand is perceived in the broader cultural conversation",
      "Brand Intelligence exclusively tracks competitor data and does not include any performance metrics for the client's own brand content",
      "Native analytics are always more accurate and granular because they come directly from each platform's first-party API without any intermediary processing"
    ], c:1
  },
  {
    s:"Brand Intelligence", sn:3,
    q:"Why is UGC considered especially important in Brand Intelligence?",
    opts:[
      "Because UGC consistently outperforms all other content types in terms of raw view counts across every platform and every product category globally",
      "Because brands pay creators directly to produce UGC through formal partnership agreements, making it the most controlled and measurable content type available",
      "Because the Winnin platform exclusively tracks UGC and does not capture paid or owned content in the Brand Intelligence module",
      "Because UGC is where the honest signal lives — it shows what the market says about a brand independently of the brand's budget and creative brief"
    ], c:3
  },
  {
    s:"Brand Intelligence", sn:3,
    q:"In Brand Intelligence, you see a relevance peak that does not align with any campaign the brand ran. What should you investigate?",
    opts:[
      "Something organic drove it — a creator, a cultural moment, or a UGC wave — and understanding what happened is valuable strategic intelligence",
      "The peak is a technical error in the platform's data pipeline — relevance peaks should always correlate directly with paid campaign flight dates",
      "The peak is strategically meaningless because it wasn't driven by paid media and therefore cannot be attributed to any deliberate brand action",
      "The brand's closest competitors must have run a campaign that accidentally boosted your client's relevance through spillover association effects"
    ], c:0
  },
  {
    s:"Brand Intelligence", sn:3,
    q:"What is Tags Monitor in the Brand tab, and when should you use it?",
    opts:[
      "A tagging system for organizing saved dashboards and analysis reports by project name, client account, and internal team assignments",
      "An AI-powered tool that automatically generates campaign taglines and creative copy based on trending topics within the brand's primary category",
      "A feature for tracking specific campaigns, hashtags, or keywords in near real-time with shorter refresh cycles — ideal when you need to monitor a live campaign or competitive moment as it unfolds",
      "A feature for managing and scheduling hashtags directly on the brand's social media accounts through native platform API integrations"
    ], c:2
  },
  {
    s:"Brand Intelligence", sn:3,
    q:"A brand shows high content volume but deteriorating sentiment over three months. What does this pattern suggest?",
    opts:[
      "The brand is performing well overall because any sustained attention — regardless of emotional tone — strengthens mental availability and long-term brand equity",
      "The brand is building attention on a weak foundation, and catching this early is one of the clearest early-warning signals the platform offers",
      "The sentiment classification model has likely drifted out of calibration and needs to be manually re-tuned by the Refinement team before the data can be trusted",
      "The brand should immediately double its content production volume to generate enough positive content to statistically overwhelm the negative sentiment signal"
    ], c:1
  },
  {
    s:"Brand Intelligence", sn:3,
    q:"What is the most common mistake teams make when reading Brand Intelligence?",
    opts:[
      "Checking Brand Intelligence too frequently — the data only refreshes quarterly, so reviewing it more often leads to over-interpretation of noise",
      "Spending too much time watching the individual video content layer instead of focusing exclusively on the aggregate quantitative metrics",
      "Reading the brand in isolation without competitive comparison — your brand growing 10% sounds good until you see every competitor grew 30% in the same period",
      "Using too many platform and content-type filters simultaneously, which fragments the data into sample sizes too small for meaningful analysis"
    ], c:2
  },
  {
    s:"Brand Intelligence", sn:3,
    q:"In the Winnin methodology's three-step cross flow, what is the correct sequence for analyzing the modules?",
    opts:[
      "Brand first to understand your current positioning → Category second to see the landscape → SoA last to check the competitive ranking",
      "Category first to understand market dynamics → Brand second to find opportunities → SoA last to validate competitive standing",
      "All three modules should be read simultaneously with no particular order — the cross only works when all data is considered at once",
      "SoA first to diagnose the competitive position → Category second to understand what's driving attention → Brand third to find the gap"
    ], c:3
  },
  {
    s:"Brand Intelligence", sn:3,
    q:"A brand's SoA is declining while the category is growing. In the Brand tab, the brand's topics don't match the top category niches. What does this cross-module pattern indicate?",
    opts:[
      "The brand is speaking a language the category has moved past — it needs to reorient its content toward the niches driving category growth",
      "The category data is outdated and needs to be refreshed by the Refinement team before any strategic conclusions can be drawn from the comparison",
      "The brand should reduce its content spending and wait for the category growth to contract back to historical averages before re-engaging",
      "The brand's SoA decline is a temporary seasonal effect that will self-correct within one to two quarters without requiring any changes to strategy"
    ], c:0
  }
];

const sc = {1:"s1", 2:"s2", 3:"s3"};
let st = {screen:"welcome", name:"", qi:0, ans:{}, sel:null, res:null, reviewed:false, logging:false, logErr:null, logOk:false};

async function logResult(r) {
  st.logging = true; st.logErr = null; st.logOk = false; render();
  const today = new Date().toISOString().split("T")[0];
  try {
    const resp = await fetch("https://api.notion.com/v1/pages", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + NOTION_TOKEN,
        "Notion-Version": "2022-06-28",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        parent: { database_id: NOTION_DB_ID },
        properties: {
          "Full Name": { title: [{ text: { content: st.name.trim() } }] },
          "Date": { date: { start: today } },
          "Score": { number: r.total },
          "Percentage": { number: r.pct },
          "Result": { select: { name: r.total >= PASS ? "✅ Pass" : "❌ Fail" } },
          "Share of Attention": { number: r.s1 },
          "Category Intelligence": { number: r.s2 },
          "Brand Intelligence": { number: r.s3 }
        }
      })
    });
    if (resp.ok) { st.logOk = true; }
    else { const b = await resp.json().catch(() => ({})); console.error("Notion:", b); st.logErr = "Logging failed — please screenshot your certificate and notify your manager."; }
  } catch(e) { console.error(e); st.logErr = "Logging failed — please screenshot your certificate and notify your manager."; }
  st.logging = false; render();
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function cornerSVG() {
  return `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 4 L4 20 M4 4 L20 4" stroke="#8b3a2f" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M4 8 L8 4" stroke="#c4a35a" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="6" cy="6" r="2" fill="#8b3a2f"/>
  </svg>`;
}

function render() {
  const app = document.getElementById("app");
  if (st.screen === "welcome") app.innerHTML = welcome();
  else if (st.screen === "quiz") app.innerHTML = quiz();
  else app.innerHTML = results();
  bind();
}

function welcome() {
  const ok = st.name.trim().length >= 2;
  return `<h1>Winnin Academy</h1>
<p class="sub">Level 01: Category & Brand — Assessment</p>
<div class="card">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Questions</div><div class="metric-val">20</div></div>
    <div class="metric"><div class="metric-label">Pass score</div><div class="metric-val">80%</div></div>
    <div class="metric"><div class="metric-label">Sections</div><div class="metric-val">3</div></div>
  </div>
  <p class="hint">Covers <strong>Share of Attention</strong> (6 questions), <strong>Category Intelligence</strong> (6 questions), and <strong>Brand Intelligence</strong> (8 questions).<br>You need <strong>16 out of 20</strong> to pass. Results are logged automatically to the team database.</p>
</div>
<div class="card">
  <label>Your full name</label>
  <input type="text" id="nameInput" value="${esc(st.name)}" placeholder="e.g. Maria Santos" maxlength="80" />
</div>
<button class="btn btn-primary btn-full" id="startBtn" ${ok ? "" : "disabled"}>Start assessment →</button>`;
}

function quiz() {
  const q = Qs[st.qi];
  const pct = Math.round((st.qi / Qs.length) * 100);
  let opts = "";
  q.opts.forEach((o, i) => {
    let cls = "opt";
    if (st.reviewed) {
      if (i === q.c) cls += " correct";
      else if (i === st.sel && i !== q.c) cls += " wrong";
    } else {
      if (i === st.sel) cls += " selected";
    }
    opts += `<button class="${cls}" data-i="${i}">${String.fromCharCode(65+i)}. ${esc(o)}</button>`;
  });
  const showCheck = st.sel !== null && !st.reviewed;
  const isLast = st.qi === Qs.length - 1;
  return `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
  <span class="section-pill ${sc[q.sn]}">${esc(q.s)}</span>
  <span style="font-size:13px;color:#888">${st.qi+1} / ${Qs.length}</span>
</div>
<p class="q-text">${esc(q.q)}</p>
<div id="opts">${opts}</div>
<div class="nav">
  <button class="btn" id="backBtn" ${st.qi === 0 ? "disabled" : ""}>← Back</button>
  <div style="display:flex;gap:8px">
    ${showCheck ? `<button class="btn" id="checkBtn">Check answer</button>` : ""}
    <button class="btn btn-primary" id="nextBtn" ${st.sel === null ? "disabled" : ""}>${isLast ? "Submit →" : "Next →"}</button>
  </div>
</div>`;
}

function results() {
  const r = st.res;
  const passed = r.total >= PASS;
  const date = new Date().toLocaleDateString("en-US", {year:"numeric", month:"long", day:"numeric"});
  const certId = "WA-L01-" + new Date().getFullYear() + "-" + Math.random().toString(36).substr(2,6).toUpperCase();

  const logHtml = st.logging
    ? `<p class="log-status log-pending">Logging result to team database...</p>`
    : st.logErr
    ? `<p class="log-status log-err">${esc(st.logErr)}</p>`
    : st.logOk

    });
    ni.addEventListener("keydown", e => {
      if (e.key === "Enter" && st.name.trim().length >= 2) document.getElementById("startBtn").click();
    });
  }
  const sb = document.getElementById("startBtn");
  if (sb) sb.addEventListener("click", () => {
    if (st.name.trim().length >= 2) {
      st.screen = "quiz"; st.qi = 0; st.ans = {}; st.sel = null; st.reviewed = false; render();
    }
  });
  document.querySelectorAll(".opt").forEach(b => {
    b.addEventListener("click", () => { if (st.reviewed) return; st.sel = parseInt(b.dataset.i); render(); });
  });
  const cb = document.getElementById("checkBtn");
  if (cb) cb.addEventListener("click", () => { st.reviewed = true; render(); });
  const nb = document.getElementById("nextBtn");
  if (nb) nb.addEventListener("click", () => {
    if (st.sel === null) return;
    st.ans[st.qi] = st.sel; st.reviewed = false;
    if (st.qi === Qs.length - 1) {
      let s1=0, s2=0, s3=0;
      Qs.forEach((q, i) => {
        const ok = st.ans[i] === q.c;
        if (q.sn === 1 && ok) s1++;
        if (q.sn === 2 && ok) s2++;
        if (q.sn === 3 && ok) s3++;
      });
      const total = s1+s2+s3;
      const pct = Math.round((total/20)*100);
      st.res = {s1, s2, s3, total, pct};
      st.screen = "results"; render();
      logResult(st.res);
    } else {
      st.qi++; st.sel = st.ans[st.qi] ?? null; render();
    }
  });
  const bb = document.getElementById("backBtn");
  if (bb) bb.addEventListener("click", () => {
    if (st.qi > 0) { st.qi--; st.sel = st.ans[st.qi] ?? null; st.reviewed = false; render(); }
  });
  const rb = document.getElementById("retakeBtn");
  if (rb) rb.addEventListener("click", () => {
    st.screen = "welcome"; st.qi = 0; st.ans = {}; st.sel = null; st.res = null; st.reviewed = false; render();
  });
}

render();
</script>
</body>
</html>
